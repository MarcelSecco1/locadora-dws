services:
    app:
        build:
            context: .
            dockerfile: docker/app/Dockerfile
        container_name: crud-locadora-app
        env_file:
            - .env
        volumes:
            - public_build:/var/www/html/public/build
            - storage_public:/var/www/html/storage/app/public
        depends_on:
            mysql:
                condition: service_started
        restart: unless-stopped

    nginx:
        image: nginx:1.27-alpine
        container_name: crud-locadora-nginx
        ports:
            - "${APP_PORT:-80}:80"
        volumes:
            - ./public:/var/www/html/public:ro
            - public_build:/var/www/html/public/build:ro
            - storage_public:/var/www/html/storage/app/public:ro
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - app
        restart: unless-stopped

    mysql:
        image: mysql:8.4
        container_name: crud-locadora-mysql
        env_file:
            - .env
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
        volumes:
            - mysql_data:/var/lib/mysql
        restart: unless-stopped

volumes:
    public_build:
    mysql_data:
    storage_public:
